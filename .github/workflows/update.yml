name: 대시보드 자동 갱신

on:
  push:
    paths:
      - 'Article search.xlsx'
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:


jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install pandas openpyxl

      - name: 대시보드 생성
        run: python generate_dashboard.py

      - name: 변경사항 자동 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "대시보드 자동 갱신 $(date '+%Y-%m-%d')" || echo "변경 없음"
          git push
